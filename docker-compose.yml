services:
  backend:
    build: ./backend
    container_name: marsflowhomeassistant-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - marsflowhomeassistant-data:/app/data
    environment:
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - MQTT_ENABLED=${MQTT_ENABLED:-false}
      - MQTT_HOST=${MQTT_HOST:-mosquitto}
      - MQTT_PORT=${MQTT_PORT:-1883}
    networks:
      - marsflowhomeassistant-net

  frontend:
    build: ./frontend
    container_name: marsflowhomeassistant-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - marsflowhomeassistant-net

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: marsflowhomeassistant-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    networks:
      - marsflowhomeassistant-net
    profiles:
      - mqtt

volumes:
  marsflowhomeassistant-data:
  mosquitto-data:

networks:
  marsflowhomeassistant-net:
    driver: bridge
